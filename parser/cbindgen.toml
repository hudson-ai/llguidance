# https://github.com/mozilla/cbindgen/blob/master/docs.md#cbindgentoml

language = "C"
cpp_compat = true
usize_is_size_t = true
include_guard = "LLGUIDANCE_H"

header = """/* See src/ffi.rs for full API documentation. */

#if defined(__cplusplus) && __cplusplus >= 201703L
#define LLGUIDANCE_NODISCARD [[nodiscard]]
#elif defined(__GNUC__) || defined(__clang__)
#define LLGUIDANCE_NODISCARD __attribute__((warn_unused_result))
#elif defined(_MSC_VER)
#define LLGUIDANCE_NODISCARD _Check_return_
#else
#define LLGUIDANCE_NODISCARD
#endif"""
# trailer = "/* Text to put at the end of the generated file */"
# pragma_once = true
# autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = false

[export.rename]
"ParserLimits" = "LlgParserLimits"

[export]
exclude = ["NodeRef"]

[fn]
must_use = "LLGUIDANCE_NODISCARD"

[defines]
"feature = rayon" = "LLGUIDANCE_HAS_RAYON"
